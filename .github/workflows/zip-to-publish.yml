name: Upload release assets

permissions:
  contents: write

on:
  release:
    types:
      - created

jobs:
  package-zip:
    name: Create zip for publishing
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v2

      - name: Create zip
        run: |
          cd rapid-charging-quick-setting@sidevesh
          zip -r ../rapid-charging-quick-setting@sidevesh.zip *
          cd ..

      - name: Upload package
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./rapid-charging-quick-setting@sidevesh.zip
          asset_name: rapid-charging-quick-setting@sidevesh.zip
          tag: ${{ github.ref }}
